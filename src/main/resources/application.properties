spring.application.name=gestortareas-api
server.port=8080

# Spring Data JPA & H2 / PostgreSQL dynamic config
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:gestortareasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console — solo para desarrollo local. En prod queda apagada (ver docker/prod/docker-compose.yaml).
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT Security
# El default de abajo es SOLO para desarrollo local. En prod es OBLIGATORIO definir
# APP_JWT_SECRET en el .env (el compose de prod falla si falta) — generar con: openssl rand -base64 64
app.jwt.secret=${APP_JWT_SECRET:GestorTareasSecretKeySuperSeguraConMasDe32CaracteresParaHS256!}
app.jwt.expiration-ms=86400000

# Password inicial del usuario "admin" (solo aplica al primer arranque con DB vacía).
# En prod definir ADMIN_INITIAL_PASSWORD en el .env.
app.seed.admin-password=${ADMIN_INITIAL_PASSWORD:admin}

# Anti fuerza bruta en /api/auth/login: tras N intentos fallidos sobre un username,
# se responde 429 hasta que pase la ventana (cada fallo nuevo la renueva).
app.login.max-intentos=${LOGIN_MAX_INTENTOS:10}
app.login.bloqueo-minutos=${LOGIN_BLOQUEO_MINUTOS:15}

# CORS / Cookie security
# En producción: reemplazá con los dominios reales separados por coma
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
# En producción cambiá a true (requiere HTTPS)
app.cookie.secure=false
app.cookie.same-site=Lax

# Mail / Digest de novedades
# Dev: Mailhog (docker-compose) atrapa los mails, no los envía de verdad. UI en http://localhost:8025
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
app.mail.from=${MAIL_FROM:notificaciones@gestortareas.local}

# Horarios del digest de novedades — formato cron de Spring: segundo minuto hora dia mes dia-semana
# Default: 12:00 (mediodía) y 19:00 (tarde/noche). Para cambiar el horario sin tocar código, sobreescribí estas env vars.
app.digest.cron.mediodia=${DIGEST_CRON_MEDIODIA:0 0 12 * * *}
app.digest.cron.noche=${DIGEST_CRON_NOCHE:0 0 19 * * *}

# Cache de membresía a tablero (usado por AccesoTableroGuard en cada chequeo de acceso).
# Se invalida por completo cuando un admin edita los tableros asignados de un usuario.
app.cache.membresia-tablero.ttl-horas=${MEMBRESIA_TABLERO_CACHE_TTL_HORAS:6}

# Adjuntos de tickets
# Carpeta donde se guardan los archivos subidos. En Docker, montar un volumen sobre esta ruta
# (ver docker-compose.yaml) para que persista entre reinicios del contenedor.
app.uploads.dir=${UPLOADS_DIR:./uploads}
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB
