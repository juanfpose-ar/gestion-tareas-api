spring.application.name=gestortareas-api
server.port=8080

# Spring Data JPA & H2 / PostgreSQL dynamic config
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:gestortareasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Security
app.jwt.secret=GestorTareasSecretKeySuperSeguraConMasDe32CaracteresParaHS256!
app.jwt.expiration-ms=86400000

# CORS / Cookie security
# En producción: reemplazá con los dominios reales separados por coma
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
# En producción cambiá a true (requiere HTTPS)
app.cookie.secure=false
app.cookie.same-site=Lax
