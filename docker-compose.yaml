version: '3.8'

services:
  gestortareas-db:
    image: postgres:16-alpine
    container_name: gestortareas-db
    restart: always
    environment:
      POSTGRES_DB: gestortareasdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init_gestorTareas.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestortareas-net

  gestortareas-api:
    image: gestortareas/api
    container_name: gestortareas-api
    restart: always
    depends_on:
      - gestortareas-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://gestortareas-db:5432/gestortareasdb?currentSchema=gestortareas
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
    ports:
      - "8081:8080"
    networks:
      - gestortareas-net
  # gestortareas-web:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   image: gestortareas/frontend:latest
  #   container_name: gestortareas-web
  #   restart: always
  #   depends_on:
  #     - gestortareas-api
  #   ports:
  #     - "80:80"
  #   networks:
  #     - gestortareas-net

networks:
  gestortareas-net:
    driver: bridge

volumes:
  postgres_data:
